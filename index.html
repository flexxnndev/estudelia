<!DOCTYPE html>
<html lang="es">

    <!-- HEAD -->
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Descubre que estudiar en Madrid y Barcelona - Estudelia</title>
        <meta name="description" content="Encuentra los diferentes estudios que puedes hacer en Madrid o Barcelona de forma intuitiva, sencilla y rápida para tu futuro profesional">
        <link rel="icon" type="image/jpg" href="srcs/icon-logo.jpg">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" 
            referrerpolicy="no-referrer" 
        />

        <link rel="stylesheet" href="styles.css">

        <meta property="og:title" content="Descubre que estudiar en Madrid y Barcelona - Estudelia">
        <meta property="og:description" content="Encuentra los diferentes estudios que puedes hacer en Madrid o Barcelona de forma intuitiva, sencilla y rápida para tu futuro profesional">
        <meta property="og:image" content="srcs/icon-logo.jpg">
        <meta property="og:image:alt" content="Logo">
    </head>

    <!-- BODY -->
    <body>

        <!-- HEADER -->
        <header>

            <!-- NAVIGATION BAR -->
            <nav class="navbar">
                <div class="logo">
                    <a href="index.html">
                        <img title="Logo página web" alt="Logo página web" src="srcs/white-logo.png">
                    </a>
                </div>

                <div>
                    <div class="search_bar">
                        <div class="search">
                            <input class="search_input" type="search" placeholder="Buscar estudios">
                            <button class="search_button">
                                <i class="fa-solid fa-magnifying-glass" style="color: rgb(0, 0, 0);" title="Icono lupa" alt="Icono lupa"></i>
                                <span>Buscar</span>
                            </button>
                        </div>

                        <button class="filter_button">
                            <i class="fa-solid fa-filter" style="color: white;" title="Icono filtrar" alt="Icono filtrar"></i>
                            <span>Búsqueda avanzada</span>
                        </button>
                    </div>
                </div>

                <button class="settings">
                    <i class="fa-solid fa-gear" title="Icono ajustes" alt="Icono ajustes" style="color: black;"></i>
                    <span>Ajustes</span>
                </button>
            </nav>

            <!-- ADVANCED SEARCH -->
            <div class="advanced_panel" id="advancedPanel" aria-hidden="true">
                <form class="advanced_form" onsubmit="return false">

                    <!-- AREA FILTER -->
                    <div class="form_group">
                        <label class="group_label">Áreas (puede seleccionar una o más)</label>
                        <div class="toggle_group">

                            <label class="toggle_button">
                                <input type="checkbox" class="area_checkbox" data-area="artes">
                                <i class="fa-solid fa-paintbrush"></i>
                                <span>Artes y humanidades</span>
                            </label>

                            <label class="toggle_button">
                                <input type="checkbox" class="area_checkbox" data-area="ciencias">
                                <i class="fa-solid fa-flask"></i>
                                <span>Ciencias</span>
                            </label>

                            <label class="toggle_button">
                                <input type="checkbox" class="area_checkbox" data-area="salud">
                                <i class="fa-solid fa-heart-pulse"></i>
                                <span>Ciencias de la salud</span>
                            </label>

                            <label class="toggle_button">
                                <input type="checkbox" class="area_checkbox" data-area="sociales">
                                <i class="fa-solid fa-user"></i>
                                <span>Ciencias Sociales y Jurídicas</span>
                            </label>

                            <label class="toggle_button">
                                <input type="checkbox" class="area_checkbox" data-area="ingenieria">
                                <i class="fa-solid fa-screwdriver-wrench"></i>
                                <span>Ingeniería, Arquitectura y Tecnología</span>
                            </label>
                        </div>
                    </div>

                    <!-- SUBAREA FILTER -->
                    <div class="form_group subarea_group" id="subareaGroup"></div>

                    <!-- PLACE FILTER -->
                    <div class="form_group">
                        <label class="group_label">Comunidades autónomas (puede seleccionar una o más)</label>
                        <div class="toggle_group">

                            <label class="toggle_button">
                                <input type="checkbox" class="area_checkbox" data-area="madrid">
                                <span>Madrid</span>
                            </label>

                            <label class="toggle_button">
                                <input type="checkbox" class="area_checkbox" data-area="barcelona">
                                <span>Barcelona</span>
                            </label>
                        </div>
                    </div>

                    <div class="form_group">
                        <datalist id="degreesTitles"></datalist>
                        <label>
                            Título de estudios
                            <input list="degreesTitles">
                        </label>
                    </div>

                    <div class="form_group">
                        <label for="filterType">Tipo de estudio</label>
                        <select id="filterType">
                            <option value="">Todos</option>
                            <option value="grado">Grado Universitario</option>
                            <option value="fp_superior">FP Grado Superior</option>
                            <option value="fp_medio">FP Grado Medio</option>
                        </select>
                    </div>

                    <div class="form_group">
                        <label for="filterModality">Modalidad</label>
                        <select id="filterModality">
                            <option value="">Todas</option>
                            <option value="presencial">Presencial</option>
                            <option value="online">Online</option>
                            <option value="hibrido">Híbrido</option>
                        </select>
                    </div>

                    <div class="form_group">
                        <label for="filterCenter">Tipo de centro</label>
                        <select id="filterCenter">
                            <option value="">Todos</option>
                            <option value="publico">Público</option>
                            <option value="privado">Privado</option>
                        </select>
                    </div>

                    <div class="form_group">
                        <label for="filterEvau">Nota de corte máxima</label>
                        <div class="range_container">
                            <input type="range" id="filterEvau" min="5" max="14" step="0.1" value="14">
                            <span id="evauValue">14.0</span>
                        </div>
                    </div>

                    <div class="form_group">
                        <label for="filterEmployment">Empleabilidad mínima (%)</label>
                        <div class="range_container">
                            <input type="range" id="filterEmployment" min="0" max="100" step="1" value="0">
                            <span id="employmentValue">0%</span>
                        </div>
                    </div>

                    <div class="form_actions">
                        <button type="button" class="apply_btn" id="applyFilters">Aplicar filtros</button>
                        <button type="button" class="reset_btn" id="resetFilters">Limpiar filtros</button>
                    </div>

                </form>
            </div>
        </header>

        <main>
            <section id="degreeList" aria-label="Catálogo de carreras">

            </section>

            <section>
                
            </section>
        </main>

        <footer>

        </footer>

        <script src="script.js"></script>

    </body>
</html>
